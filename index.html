<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entropy — 3D Particle Sculpture</title>
    <meta
      name="description"
      content="A floating 3D particle sculpture that scatters like sand and reassembles in slow motion."
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <canvas id="entropy"></canvas>

    <button id="upload-btn" aria-label="Upload an image">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
        />
        <circle cx="12" cy="13" r="4" />
      </svg>
    </button>
    <input
      type="file"
      id="file-input"
      accept="image/*"
      capture="environment"
      style="display: none"
    />

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
